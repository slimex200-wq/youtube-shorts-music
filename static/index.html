<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Shorts Music</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-brand" onclick="switchTab('shorts')" style="cursor:pointer">
    <span class="nav-brand-dot"></span>
    TuneBoard
  </div>
  <div class="nav-divider"></div>
  <div class="nav-tabs" id="nav-tabs">
    <button class="ntab on" onclick="switchTab('shorts')">라이브러리</button>
    <button class="ntab" onclick="switchTab('analytics')">분석</button>
    <button class="ntab" onclick="switchTab('editor')">에디터</button>
  </div>
  <div class="nav-right" id="nav-right">
    <button class="nav-settings-btn" onclick="showSettingsModal()" title="Settings">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6.5 1.5L6.8 3.1a5 5 0 011.4.6l1.3-.9 1.4 1.4-.9 1.3a5 5 0 01.6 1.4l1.6.3v2l-1.6.3a5 5 0 01-.6 1.4l.9 1.3-1.4 1.4-1.3-.9a5 5 0 01-1.4.6L9.5 14.5h-2l-.3-1.6a5 5 0 01-1.4-.6l-1.3.9-1.4-1.4.9-1.3a5 5 0 01-.6-1.4L1.5 9.5v-2l1.6-.3a5 5 0 01.6-1.4l-.9-1.3 1.4-1.4 1.3.9a5 5 0 011.4-.6L6.5 1.5z" stroke="currentColor" stroke-width="1.2"/><circle cx="8.5" cy="8.5" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
    </button>
  </div>
</nav>

<!-- Dashboard -->
<div id="view-dashboard">
  <div class="main">
    <div id="project-list"></div>
  </div>
</div>

<!-- Project Detail -->
<div id="view-project" class="hidden">
  <div class="main">
    <div class="project-topbar">
      <button class="nav-back" onclick="switchTab('shorts')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        목록으로
      </button>
      <span class="project-topbar-title" id="project-topbar-title"></span>
    </div>
    <!-- Steps -->
    <div class="steps" id="steps-bar"></div>

    <!-- Step content -->
    <div id="step-content"></div>
  </div>
</div>


<!-- Analytics View -->
<div id="view-analytics" class="hidden">
  <div class="main">
    <div id="analytics-content"></div>
  </div>
</div>

<!-- Editor View -->
<div id="view-editor" class="hidden">
  <div class="main">
  <section>
    <div class="section-header">
      <span class="section-title">Editor — Images + Music → Full Video</span>
    </div>

    <div class="editor-upload-grid">
      <div class="editor-upload-box">
        <div class="editor-upload-label">Songs</div>
        <div id="editor-songs-dropzone" class="dropzone">
          <div class="dropzone-label">Drop songs here or click</div>
          <div class="dropzone-hint">.mp3 .wav .flac .m4a .aac .ogg</div>
          <input type="file" accept=".mp3,.wav,.flac,.m4a,.aac,.ogg" multiple style="display:none">
        </div>
        <div id="editor-songs-list" class="editor-file-list"></div>
      </div>
      <div class="editor-upload-box">
        <div class="editor-upload-label">Images</div>
        <div id="editor-images-dropzone" class="dropzone">
          <div class="dropzone-label">Drop images here or click</div>
          <div class="dropzone-hint">.png .jpg .jpeg .webp</div>
          <input type="file" accept=".png,.jpg,.jpeg,.webp" multiple style="display:none">
        </div>
        <div id="editor-images-list" class="editor-file-list"></div>
      </div>
    </div>

    <div class="mt-16" style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-primary" id="editor-compose-btn" onclick="handleEditorCompose()" disabled>
        Compose Videos
      </button>
      <span id="editor-status" class="text-sm text-3"></span>
    </div>

    <div id="editor-results" class="mt-16"></div>
  </section>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-bg hidden" onclick="if(event.target===this)hideSettingsModal()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Settings</span>
      <button class="modal-close" type="button" onclick="hideSettingsModal()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="settings-form" onsubmit="handleSaveSettings(event)">
        <div class="form-row" style="margin-bottom:12px">
          <label class="form-label">YouTube Channel Handle</label>
          <input class="form-input" name="YOUTUBE_CHANNEL_HANDLE" placeholder="@YourChannel">
        </div>
        <div class="form-row" style="margin-bottom:12px">
          <label class="form-label">YouTube API Key</label>
          <input class="form-input" name="YOUTUBE_API_KEY" placeholder="AIzaSy..." type="password">
          <div class="text-sm text-3" style="margin-top:4px"><a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:var(--acc)">Get API Key</a></div>
        </div>
        <div class="form-row" style="margin-bottom:12px">
          <label class="form-label">Anthropic API Key <span class="text-3">(optional if using Claude CLI)</span></label>
          <input class="form-input" name="ANTHROPIC_API_KEY" placeholder="sk-ant-..." type="password">
        </div>
        <div class="form-row" style="margin-bottom:12px">
          <label class="form-label">Artist Name <span class="text-3">(for title cards)</span></label>
          <input class="form-input" name="ARTIST_NAME" placeholder="Your artist name">
        </div>
        <div class="modal-foot">
          <span id="settings-status" class="text-sm text-3"></span>
          <button type="submit" class="btn btn-p">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Create Modal -->
<div id="create-modal" class="modal-bg hidden" onclick="if(event.target===this)hideCreateModal()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">새 프로젝트</span>
      <button class="modal-close" type="button" onclick="hideCreateModal()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
    <form id="create-form" onsubmit="handleCreate(event)">
      <div class="form-row" style="margin-bottom:12px">
        <label class="form-label">최근 장르</label>
        <div class="genre-presets" id="genre-presets"></div>
      </div>
      <div class="form-row" style="margin-bottom:12px">
        <label class="form-label">비율</label>
        <div style="display:flex;gap:6px">
          <label class="ratio-chip on" onclick="selectRatio(this,'9:16')"><input type="radio" name="aspect_ratio" value="9:16" checked hidden>9:16 Shorts</label>
          <label class="ratio-chip" onclick="selectRatio(this,'16:9')"><input type="radio" name="aspect_ratio" value="16:9" hidden>16:9 Video</label>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">장르</label>
        <input class="form-input" name="genre" placeholder="lo-fi hip hop, dark trap, schranz..." required>
      </div>
      <div class="form-group mt-12">
        <label class="form-label">모델</label>
        <div style="display:flex;gap:6px">
          <label class="ratio-chip" onclick="selectModel(this,'haiku')"><input type="radio" name="model" value="haiku" hidden>Haiku (Fast)</label>
          <label class="ratio-chip on" onclick="selectModel(this,'sonnet')"><input type="radio" name="model" value="sonnet" checked hidden>Sonnet</label>
        </div>
      </div>
      <div class="form-group mt-12 hidden" id="substyle-group">
        <label class="form-label">Shranz Substyle</label>
        <select class="form-input" name="substyle" id="substyle-select">
          <option value="">Auto (avoid recent)</option>
        </select>
        <div class="text-sm text-3" style="margin-top:4px" id="substyle-hint"></div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-s" onclick="hideCreateModal()">취소</button>
        <button type="submit" class="btn btn-p" id="create-btn">만들기</button>
      </div>
    </form>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
